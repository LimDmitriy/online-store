<div class="collapse bg-dark" id="navbarHeader">
        <div class="container">
          <div class="row">
            <div class="col-sm-8 col-md-7 py-4">
              <h4 class="text-white">О магазине</h4>
              <p class="text-white">Onlile-store - удобное место для покупок, где вы найдете всё необходимое в одном каталоге.</p>
            </div>
            <div class="col-sm-4 offset-md-1 py-4">
              <h4 class="text-white">Навигация</h4>
              <ul class="list-unstyled">
                <li><a href="{% url 'catalog:product_list' %}" class="text-white">Главная</a></li>
                {% if user.is_authenticated %}
                <form method="post" action="{% url 'users:logout' %}" class="d-inline">
                   {% csrf_token %}
                  <button type="submit" class="btn btn-link text-white p-0 m-0 align-baseline">Выйти</button>
                </form>
                {% else %}
                <li><a href="{% url 'users:login' %}" class="text-white">Вход</a></li>
                <li><a href="{% url 'users:register' %}" class="text-white">Регистрация</a></li>
                {% endif %}
              </ul>
            </div>
          </div>
        </div>
      </div>
      <div class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
          <a href="{% url 'catalog:product_list' %}" class="navbar-brand d-flex align-items-center">
            <strong>Online-store</strong>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarHeader" aria-controls="navbarHeader" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </div>
