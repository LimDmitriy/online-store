{% extends 'catalog/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <form method="post" enctype="multipart/form-data">
                <div class="card">
                    <div class="card-body">
                        {% csrf_token %}
                        {{ form.as_p }}
                    </div>
                    <p class="card-text">Вы действительно хотите удалить{{ object.name }} ?</p>
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a class="btn btn-secondary" href="{% url 'catalog:product_list' %}">Отменить</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
