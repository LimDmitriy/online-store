{% extends 'blog/base.html' %}
{% load my_tags %}
{% block content %}
<div class="album py-5 bg-light">
    <div class="container d-flex justify-content-center">
        <div class="row" style="max-width: 800px; width: 100%;">
            <div class="col">
                <div class="card shadow-sm">
                    {% if object.image %}
                        <img src="{{ object.image|media_filter }}" class="card-img-top" alt="{{ object.title }}">
                    {% endif %}
                    <div class="card-body">
                        <h3 class="card-title text-center">{{ object.title }}</h3>
                        <p class="card-text">{{ object.content }}</p>
                        <p class="card-text text-muted text-end">{{ object.created_at }} </p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div class="btn-group">
                                <a class="btn btn-primary" href="{% url 'blog:article_list' %}" role="button">Назад</a>
                                <a class="btn btn-secondary" href="{% url 'blog:article_update' object.pk %}" role="button">Редактировать</a>
                                <a class="btn btn-danger" href="{% url 'blog:article_delete' object.pk %}" role="button">Удалить</a>
                            </div>
                            <small class="text-muted">Просмотров: {{ object.views_counter }}</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
